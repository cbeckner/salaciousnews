baseURL = "https://salacious.news/"
languageCode = "en-us"
title = "Salacious News"
theme = "salaciousnews"

[pagination]
  pagerSize = 10 # Number of posts per page

pluralizeListTitles = false
summaryLength = 20

[services]
  [services.googleAnalytics]
    id = "G-MRRZYLYQC7"

[Author] # Used in authorbox
  name = "John Doe"
  bio = "John Doe's true identity is unknown. Maybe he is a successful blogger or writer. Nobody knows it."
  avatar = "img/avatar.png"

[Params]
  description = "Salacious News!  All the hot gossip from around the world" # Site description. Used in meta description
  subtitle = "All the hot gossip from around the world. All true!"
  copyright = "XYZ Consulting LLC" # Footer copyright holder, otherwise will use site title
  footerBlurb = "For all the latest gossip."
  opengraph = true # Enable OpenGraph if true
  schema = true # Enable Schema
  twitter_cards = true # Enable Twitter Cards if true
  readmore = true # Show "Read more" button in list if true 
  authorbox = true # Show authorbox at bottom of pages if true
  toc = true # Enable Table of Contents
  pager = true # Show pager navigation (prev/next links) at the bottom of pages if true
  post_meta = [ "date", "categories"] # Order of post meta information
  mainSections = ["post", "news", "Business", "Entertainment", "General", "Health", "Science", "Sports", "Technology"] # Specify section pages to show on home page and the "Recent articles" widget
  subSections = ["Business","Entertainment","General","Health","Science","Sports","Technology"]
  dateformat = "2006-01-02" # Change the format of dates
  mathjax = false # Enable MathJax
  mathjaxPath = "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.6/MathJax.js" # Specify MathJax path
  mathjaxConfig = "TeX-AMS-MML_HTMLorMML" # Specify MathJax config
  googleFontsLink = "https://fonts.googleapis.com/css?family=Open+Sans:400,400i,700" # Load Google Fonts
  # customCSS = ["css/custom.css"] # Include custom CSS files
  # customJS = ["js/custom.js"] # Include custom JS files

[[Params.plugins.js]]
  link = "js/lib/bootstrap.bundle.min.js"
[[Params.plugins.js]]
  link = "js/lib/wow.min.js" 
[[Params.plugins.js]]
  link = "js/lib/jquery.fancybox.js" 
[[Params.plugins.js]]
  link = "js/lib/lity.js" 
[[Params.plugins.js]]
  link = "js/lib/swiper.min.js" 
[[Params.plugins.js]]
  link = "js/lib/jquery.waypoints.min.js"
[[Params.plugins.js]]
  link = "js/lib/jquery.counterup.js" 
[[Params.plugins.js]]
  link = "js/lib/back-to-top.js" 
[[Params.plugins.js]]
  link = "js/lib/parallaxie.js" 
[[Params.plugins.js]]
  link = "js/lib/lazysizes.min.js" 

[Params.style.vars]
  # highlightColor = "#e22d30" # Override highlight color
  highlightColor = "#3ba5a9"

  # Override font-family sets
  # Take care of different quotes OR escaping symbols in these params if necessary
  fontFamilyPrimary = "'Open Sans', Helvetica, Arial, sans-serif"
  # Secondary font-family set responsible for pre, code, kbd, and samp tags font
  fontFamilySecondary = "SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace"

[Params.logo]
  banner = "img/banner.webp"
  image = "img/salacious-news-logo_small.webp" # Logo image. Path relative to "static"
  title = "Salacious News" # Logo title, otherwise will use site title
  subtitle = "All the hot gossip from around the world" # Logo subtitle

[Params.thumbnail]
  visibility = ["list", "post"] # Control thumbnail visibility

[Params.adsense]
  client = "ca-pub-5733732343388471"
  [Params.adsense.slots]
    billboard = "1832220320"     # top leaderboard (970x250 / 320x100)
    nativeband = "4663273500"    # in-feed native band
    mpuSidebar = "3556365530"    # rail MPU (300x250)
    leaderboard = "2326447878"
    halfpage = "3116246362"
    inarticle = "8775215937"
    mpu1 = "7591518317"
    mpu2 = "1201664931"
    topMobile = "2243283860"
    multiplex = "2051712172"     # "Around the Web" multiplex ad (home/category pages)

[Params.sidebar]
  home = "right" # Configure layout for home page
  list = "left"  # Configure layout for list pages
  single = false # Configure layout for single pages
  # Enable widgets in given order
  widgets = ["search", "recent", "categories",  "social"]

[Params.widgets]
  recent_num = 5 # Set the number of articles in the "Recent articles" widget
  skip_num = 5 # Set the number of articles in the "Recent articles" widget to skip
  categories_counter = false # Enable counter for each category in "Categories" widget
  tags_counter = false # Enable counter for each tag in "Tags" widget

[Params.widgets.social]
  cached = false # activate cache if true
  # Enable parts of social widget
  # twitter = "username"
  instagram = "salacious_news"
  email = "info@salacious.news"

[[Params.widgets.social.custom]]
  title = "Sarcastic News"
  url = "https://salacious.news"

[Params.widgets.search]
  cached = true # activate cache if true
  url = "https://google.com/search"
  [Params.widgets.search.input]
    name = "sitesearch"
    pre = ""

[build]
  writeStats = true

[Taxonomies]
  category = "categories"