{{- $ctx := .ctx }}
{{- $zone := $ctx.Site.Params.adsterra.zones.inarticle }}
<div class="ad-slot in-article-ad" style="min-height:250px;">
  <span class="ad-label">Advertisement</span>
  {{- if $zone }}
  <script>
    atOptions = { 'key' : '{{ $zone.key }}', 'format' : 'iframe', 'height' : {{ $zone.h }}, 'width' : {{ $zone.w }}, 'params' : {} };
  </script>
  <script src="https://www.highperformanceformat.com/{{ $zone.key }}/invoke.js"></script>
  {{- else }}
  <span class="ad-size">In-article</span>
  <span class="ad-kind">In-article · fluid</span>
  {{- end }}
</div>
