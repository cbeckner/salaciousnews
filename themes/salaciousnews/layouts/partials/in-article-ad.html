{{- $ctx := .ctx }}
{{- $client := $ctx.Site.Params.adsense.client }}
{{- $slotID := index $ctx.Site.Params.adsense.slots "inarticle" }}
<div class="ad-slot in-article-ad" style="min-height:250px;">
  <span class="ad-label">Advertisement</span>
  {{- if and $client $slotID }}
  <ins class="adsbygoogle" style="display:block; text-align:center;"
    data-ad-layout="in-article" data-ad-format="fluid"
    data-ad-client="{{ $client }}" data-ad-slot="{{ $slotID }}"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  {{- else }}
  <span class="ad-size">In-article</span>
  <span class="ad-kind">In-article · fluid</span>
  {{- end }}
</div>
