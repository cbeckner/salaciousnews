{{- $ctx := .ctx }}
{{- $mobile := .mobile | default false }}
{{- $client := $ctx.Site.Params.adsense.client }}
{{- $slotID := index $ctx.Site.Params.adsense.slots "nativeband" }}
<div class="{{ if $mobile }}tbm-card{{ else }}tb-card{{ end }} ad-slot" style="min-height:{{ if $mobile }}180{{ else }}168{{ end }}px;{{ if $mobile }}margin:8px 0;{{ end }}">
  <span class="ad-label">Advertisement</span>
  {{- if and $client $slotID }}
  <ins class="adsbygoogle" style="display:block;width:100%;"
    data-ad-client="{{ $client }}" data-ad-slot="{{ $slotID }}"
    data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  {{- else }}
  <span class="ad-size">In-feed</span>
  <span class="ad-kind">Native · auto</span>
  {{- end }}
</div>
