{{- $ctx := .ctx }}
{{- $mobile := .mobile | default false }}
{{- $zone := index $ctx.Site.Params.adsterra.zones "mpuSidebar" }}
<div class="{{ if $mobile }}tbm-card{{ else }}tb-card{{ end }} ad-slot" style="min-height:{{ if $mobile }}180{{ else }}168{{ end }}px;{{ if $mobile }}margin:8px 0;{{ end }}">
  <span class="ad-label">Advertisement</span>
  {{- if not $mobile }}
  {{ partial "native-banner.html" (dict "ctx" $ctx) }}
  {{- else if $zone }}
  <script>
    atOptions = { 'key' : '{{ $zone.key }}', 'format' : 'iframe', 'height' : {{ $zone.h }}, 'width' : {{ $zone.w }}, 'params' : {} };
  </script>
  <script src="https://www.highperformanceformat.com/{{ $zone.key }}/invoke.js"></script>
  {{- else }}
  <span class="ad-size">In-feed</span>
  <span class="ad-kind">Native · auto</span>
  {{- end }}
</div>
